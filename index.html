<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re-Implementation ROI Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #12131a; color: #e0e2e8; font-family: 'DM Sans', sans-serif; }
    input[type=range] { height: 6px; border-radius: 3px; cursor: pointer; -webkit-appearance: none; appearance: none; background: #1a1c24; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #6ee7a0; cursor: pointer; }
    input[type=range].yellow::-webkit-slider-thumb { background: #fbbf24; }
    input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #6ee7a0; cursor: pointer; border: none; }
    input[type=range].yellow::-moz-range-thumb { background: #fbbf24; }
    input[type=range]::-webkit-slider-runnable-track { background: #1a1c24; border-radius: 3px; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
    ::selection { background: #6ee7a044; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const FACTORY_DEFAULTS = {
      arr: 35000, churnProb: 40, hours: 30, hourlyRate: 150, threshold: 250,
      arrMin: 10000, arrMax: 80000, hoursMin: 5, hoursMax: 80,
    };

    const SCENARIOS = [
      { label: "Low-touch fix", arr: 22000, churnProb: 20, hours: 15, desc: "Minor config tweak" },
      { label: "Mid-tier save", arr: 35000, churnProb: 45, hours: 30, desc: "Moderate rebuild" },
      { label: "Enterprise rescue", arr: 50000, churnProb: 70, hours: 45, desc: "Major rework, high-value" },
      { label: "Quick win", arr: 28000, churnProb: 60, hours: 10, desc: "Small effort, high signal" },
    ];

    function Slider({ label, value, onChange, min, max, step, format, sublabel }) {
      return (
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
            <div>
              <span style={{ fontSize: 13, fontWeight: 600, color: "#c8cad0", letterSpacing: "0.04em", textTransform: "uppercase" }}>{label}</span>
              {sublabel && <span style={{ fontSize: 11, color: "#6b7080", marginLeft: 8, fontStyle: "italic" }}>{sublabel}</span>}
            </div>
            <span style={{ fontSize: 22, fontWeight: 700, color: "#fff", fontFamily: "'Space Mono', monospace" }}>{format(value)}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={e => onChange(Number(e.target.value))} style={{ width: "100%" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#555", marginTop: 2 }}>
            <span>{format(min)}</span><span>{format(max)}</span>
          </div>
        </div>
      );
    }

    function NumberInput({ label, value, onChange, min, max, step, prefix, suffix }) {
      return (
        <div style={{ flex: 1, minWidth: 140 }}>
          <label style={{ fontSize: 11, fontWeight: 600, color: "#6b7080", letterSpacing: "0.06em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>{label}</label>
          <div style={{ display: "flex", alignItems: "center", background: "#12131a", borderRadius: 8, border: "1px solid #2a2d38", padding: "8px 12px", gap: 4 }}>
            {prefix && <span style={{ color: "#555", fontSize: 14, fontFamily: "'Space Mono', monospace" }}>{prefix}</span>}
            <input type="number" value={value} min={min} max={max} step={step}
              onChange={e => onChange(Number(e.target.value))}
              style={{ background: "none", border: "none", color: "#fff", fontSize: 16, fontWeight: 700, fontFamily: "'Space Mono', monospace", width: "100%", outline: "none" }} />
            {suffix && <span style={{ color: "#555", fontSize: 12, fontFamily: "'Space Mono', monospace", whiteSpace: "nowrap" }}>{suffix}</span>}
          </div>
        </div>
      );
    }

    function ScoreGauge({ score, threshold }) {
      const maxScore = 1500;
      const pct = Math.min(score / maxScore, 1);
      const threshPct = Math.min(threshold / maxScore, 1);
      const pass = score >= threshold;
      const color = pass ? "#6ee7a0" : "#ff6b6b";
      return (
        <div style={{ position: "relative", height: 18, background: "#1a1c24", borderRadius: 9, overflow: "visible", marginBottom: 8 }}>
          <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct * 100}%`,
            background: `linear-gradient(90deg, ${pass ? "#2d6a4f" : "#6b2020"}, ${color})`,
            borderRadius: 9, transition: "width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s" }} />
          <div style={{ position: "absolute", left: `${threshPct * 100}%`, top: -4, bottom: -4, width: 2, background: "#fbbf24", zIndex: 2 }}>
            <div style={{ position: "absolute", top: -20, left: "50%", transform: "translateX(-50%)", fontSize: 9, color: "#fbbf24", whiteSpace: "nowrap", fontFamily: "'Space Mono', monospace", fontWeight: 700 }}>
              ▼ {threshold}
            </div>
          </div>
        </div>
      );
    }

    function SettingsPanel({ settings, onChange, onClose }) {
      const s = settings;
      const set = (key, val) => onChange({ ...s, [key]: val });
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#181a23", borderRadius: 20, padding: 36, maxWidth: 560, width: "100%", border: "1px solid #2a2d38", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 80px rgba(0,0,0,0.6)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div>
                <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: "#fff" }}>Team Settings</h2>
                <p style={{ margin: "4px 0 0", fontSize: 12, color: "#6b7080" }}>Configure the decision framework for your team</p>
              </div>
              <button onClick={onClose} style={{ background: "#22242e", border: "none", color: "#9ca3af", width: 32, height: 32, borderRadius: 8, fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
            </div>

            <div style={{ background: "linear-gradient(135deg, #1a2332 0%, #12131a 100%)", borderRadius: 14, padding: 24, marginBottom: 24, border: "1px solid #2a3a4a" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#fbbf24" }} />
                <span style={{ fontSize: 11, fontWeight: 700, color: "#fbbf24", letterSpacing: "0.1em", textTransform: "uppercase", fontFamily: "'Space Mono', monospace" }}>Breaking Point</span>
              </div>
              <p style={{ fontSize: 12, color: "#6b7080", margin: "4px 0 16px", lineHeight: 1.5 }}>
                The minimum score to greenlight a re-implementation. Score = (ARR × Churn%) ÷ Hours.
              </p>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <input type="range" className="yellow" min={50} max={1000} step={10} value={s.threshold}
                  onChange={e => set("threshold", Number(e.target.value))} style={{ flex: 1 }} />
                <span style={{ fontSize: 32, fontWeight: 700, color: "#fbbf24", fontFamily: "'Space Mono', monospace", minWidth: 70, textAlign: "right" }}>{s.threshold}</span>
              </div>
              <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[
                  { val: 150, label: "Aggressive", desc: "Accept most requests" },
                  { val: 300, label: "Balanced", desc: "Moderate filter" },
                  { val: 500, label: "Conservative", desc: "Only high-value saves" },
                ].map(p => (
                  <button key={p.val} onClick={() => set("threshold", p.val)} style={{
                    background: s.threshold === p.val ? "#fbbf2418" : "#12131a",
                    border: `1px solid ${s.threshold === p.val ? "#fbbf24" : "#22242e"}`,
                    borderRadius: 8, padding: "10px 8px", cursor: "pointer", textAlign: "center",
                  }}>
                    <div style={{ fontSize: 16, fontWeight: 700, color: s.threshold === p.val ? "#fbbf24" : "#fff", fontFamily: "'Space Mono', monospace" }}>{p.val}</div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: "#9ca3af", marginTop: 2 }}>{p.label}</div>
                    <div style={{ fontSize: 9, color: "#555", marginTop: 2 }}>{p.desc}</div>
                  </button>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12, fontFamily: "'Space Mono', monospace" }}>Cost Model</div>
              <NumberInput label="Hourly Cost" value={s.hourlyRate} onChange={v => set("hourlyRate", v)} min={30} max={500} step={5} prefix="€" suffix="/hour" />
              <p style={{ fontSize: 11, color: "#555", marginTop: 8, lineHeight: 1.5 }}>Fully loaded: salary + benefits + overhead + opportunity cost.</p>
            </div>

            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12, fontFamily: "'Space Mono', monospace" }}>Slider Ranges</div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <NumberInput label="ARR Min" value={s.arrMin} onChange={v => set("arrMin", v)} min={1000} max={s.arrMax - 1000} step={1000} prefix="€" />
                <NumberInput label="ARR Max" value={s.arrMax} onChange={v => set("arrMax", v)} min={s.arrMin + 1000} max={500000} step={1000} prefix="€" />
              </div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12 }}>
                <NumberInput label="Hours Min" value={s.hoursMin} onChange={v => set("hoursMin", v)} min={1} max={s.hoursMax - 1} step={1} suffix="h" />
                <NumberInput label="Hours Max" value={s.hoursMax} onChange={v => set("hoursMax", v)} min={s.hoursMin + 1} max={200} step={1} suffix="h" />
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={onClose} style={{ background: "#6ee7a0", border: "none", color: "#0a0b0e", padding: "10px 28px", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Done</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [arr, setArr] = useState(FACTORY_DEFAULTS.arr);
      const [churnProb, setChurnProb] = useState(FACTORY_DEFAULTS.churnProb);
      const [hours, setHours] = useState(FACTORY_DEFAULTS.hours);
      const [showSettings, setShowSettings] = useState(false);
      const [settings, setSettings] = useState({
        threshold: FACTORY_DEFAULTS.threshold, hourlyRate: FACTORY_DEFAULTS.hourlyRate,
        arrMin: FACTORY_DEFAULTS.arrMin, arrMax: FACTORY_DEFAULTS.arrMax,
        hoursMin: FACTORY_DEFAULTS.hoursMin, hoursMax: FACTORY_DEFAULTS.hoursMax,
      });

      const calc = useMemo(() => {
        const expectedSave = arr * (churnProb / 100);
        const cost = hours * settings.hourlyRate;
        const roi = cost > 0 ? ((expectedSave - cost) / cost) * 100 : 0;
        const score = hours > 0 ? (arr * (churnProb / 100)) / hours : 0;
        const pass = score >= settings.threshold;
        const breakEvenProb = cost > 0 ? Math.min((cost / arr) * 100, 100) : 0;
        const paybackMonths = expectedSave > 0 ? (cost / expectedSave) * 12 : Infinity;
        return { expectedSave, cost, roi, score, pass, breakEvenProb, paybackMonths };
      }, [arr, churnProb, hours, settings]);

      function loadScenario(s) { setArr(s.arr); setChurnProb(s.churnProb); setHours(s.hours); }

      const panelBg = "#181a23";

      return (
        <div style={{ minHeight: "100vh", background: "radial-gradient(ellipse at 30% 0%, #1a2332 0%, #12131a 60%)", padding: "32px 16px" }}>
          {showSettings && <SettingsPanel settings={settings} onChange={setSettings} onClose={() => setShowSettings(false)} />}

          <div style={{ maxWidth: 880, margin: "0 auto" }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                  <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#6ee7a0" }} />
                  <span style={{ fontSize: 11, fontWeight: 600, color: "#6ee7a0", letterSpacing: "0.12em", textTransform: "uppercase", fontFamily: "'Space Mono', monospace" }}>Implementations Team</span>
                </div>
                <h1 style={{ fontSize: 28, fontWeight: 700, color: "#fff", margin: "0 0 6px 0", lineHeight: 1.2 }}>Re-Implementation ROI Calculator</h1>
                <p style={{ fontSize: 14, color: "#6b7080", margin: 0, lineHeight: 1.5, maxWidth: 540 }}>Should we invest implementation hours on this live customer?</p>
              </div>
              <button onClick={() => setShowSettings(true)} style={{ background: panelBg, border: "1px solid #2a2d38", borderRadius: 10, padding: "10px 18px", color: "#9ca3af", fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 16 }}>⚙</span> Settings
              </button>
            </div>

            {/* Threshold badge */}
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
              <div style={{ background: "#fbbf2410", border: "1px solid #fbbf2430", borderRadius: 8, padding: "6px 14px", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 10, color: "#fbbf24", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: "'Space Mono', monospace" }}>Breaking point:</span>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#fbbf24", fontFamily: "'Space Mono', monospace" }}>{settings.threshold}</span>
                <button onClick={() => setShowSettings(true)} style={{ background: "none", border: "none", color: "#fbbf2480", fontSize: 11, cursor: "pointer", textDecoration: "underline" }}>change</button>
              </div>
              <div style={{ fontSize: 11, color: "#444", fontFamily: "'Space Mono', monospace" }}>cost: €{settings.hourlyRate}/h</div>
            </div>

            {/* Scenarios */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
              {SCENARIOS.map((s, i) => (
                <button key={i} onClick={() => loadScenario(s)} title={s.desc} style={{ background: panelBg, border: "1px solid #2a2d38", borderRadius: 8, padding: "7px 14px", color: "#9ca3af", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>
                  {s.label}
                </button>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              {/* Inputs */}
              <div style={{ background: panelBg, borderRadius: 16, padding: 28, border: "1px solid #22242e" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20, fontFamily: "'Space Mono', monospace" }}>Customer Parameters</div>
                <Slider label="Customer ARR" value={arr} onChange={setArr} min={settings.arrMin} max={settings.arrMax} step={1000} format={v => `€${(v/1000).toFixed(0)}k`} sublabel="annual contract value" />
                <Slider label="Churn Probability" value={churnProb} onChange={setChurnProb} min={5} max={95} step={5} format={v => `${v}%`} sublabel="if we don't re-implement" />
                <Slider label="Hours to Invest" value={hours} onChange={setHours} min={settings.hoursMin} max={settings.hoursMax} step={5} format={v => `${v}h`} sublabel="implementation team effort" />
                <div style={{ background: "#12131a", borderRadius: 10, padding: 14, marginTop: 8 }}>
                  <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8, fontFamily: "'Space Mono', monospace" }}>Churn probability guide</div>
                  {[
                    { pct: "10-20%", desc: "Mentioned competitor, minor complaints" },
                    { pct: "30-45%", desc: "Escalated, multiple issues, CSM flagged" },
                    { pct: "50-65%", desc: "Evaluating alternatives, champion disengaged" },
                    { pct: "70-90%", desc: "Renewal at risk, exec sponsor involved" },
                  ].map((g, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, marginBottom: 4, alignItems: "baseline" }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#6ee7a0", fontFamily: "'Space Mono', monospace", minWidth: 48 }}>{g.pct}</span>
                      <span style={{ fontSize: 11, color: "#6b7080" }}>{g.desc}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Results */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{
                  background: calc.pass ? "linear-gradient(135deg, #0f2a1a 0%, #162b20 100%)" : "linear-gradient(135deg, #2a1010 0%, #2b1616 100%)",
                  borderRadius: 16, padding: 28, border: `1px solid ${calc.pass ? "#1a4a2e" : "#4a1a1a"}`,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14, fontFamily: "'Space Mono', monospace" }}>Verdict</div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 12 }}>
                    <span style={{ fontSize: 48, fontWeight: 700, fontFamily: "'Space Mono', monospace", color: calc.pass ? "#6ee7a0" : "#ff6b6b", lineHeight: 1 }}>{Math.round(calc.score)}</span>
                    <span style={{ fontSize: 14, color: "#6b7080" }}>score</span>
                    <span style={{ fontSize: 13, color: "#444" }}>/ {settings.threshold} needed</span>
                  </div>
                  <ScoreGauge score={calc.score} threshold={settings.threshold} />
                  <div style={{ display: "inline-block", padding: "5px 14px", borderRadius: 20, background: calc.pass ? "#6ee7a022" : "#ff6b6b22", color: calc.pass ? "#6ee7a0" : "#ff6b6b", fontSize: 13, fontWeight: 700, marginTop: 8 }}>
                    {calc.pass ? "✓ GREENLIGHT — Do the re-implementation" : "✗ DECLINE — Not worth the investment"}
                  </div>
                </div>

                <div style={{ background: panelBg, borderRadius: 16, padding: 28, border: "1px solid #22242e" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16, fontFamily: "'Space Mono', monospace" }}>Breakdown</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                    {[
                      { label: "Expected Save", value: `€${(calc.expectedSave/1000).toFixed(1)}k`, sub: `${(arr/1000).toFixed(0)}k × ${churnProb}%` },
                      { label: "Re-impl Cost", value: `€${(calc.cost/1000).toFixed(1)}k`, sub: `${hours}h × €${settings.hourlyRate}/h` },
                      { label: "ROI", value: `${calc.roi > 0 ? "+" : ""}${Math.round(calc.roi)}%`, sub: "(save − cost) / cost", color: calc.roi > 0 ? "#6ee7a0" : "#ff6b6b" },
                      { label: "Payback", value: calc.paybackMonths < 99 ? `${calc.paybackMonths.toFixed(1)}mo` : "n/a", sub: "months to recover cost" },
                    ].map((m, i) => (
                      <div key={i} style={{ background: "#12131a", borderRadius: 10, padding: "14px 16px" }}>
                        <div style={{ fontSize: 10, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4, fontFamily: "'Space Mono', monospace" }}>{m.label}</div>
                        <div style={{ fontSize: 22, fontWeight: 700, color: m.color || "#fff", fontFamily: "'Space Mono', monospace" }}>{m.value}</div>
                        <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>{m.sub}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{ background: panelBg, borderRadius: 16, padding: 20, border: "1px solid #22242e" }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10, fontFamily: "'Space Mono', monospace" }}>Quick read</div>
                  <p style={{ fontSize: 13, color: "#9ca3af", margin: 0, lineHeight: 1.6 }}>
                    {calc.pass
                      ? `This customer's expected save of €${(calc.expectedSave/1000).toFixed(1)}k justifies the €${(calc.cost/1000).toFixed(1)}k investment. At ${Math.round(calc.roi)}% ROI, you'd recover the cost in ~${calc.paybackMonths.toFixed(1)} months of retained revenue.`
                      : `The expected save of €${(calc.expectedSave/1000).toFixed(1)}k doesn't justify €${(calc.cost/1000).toFixed(1)}k in implementation hours. ${calc.breakEvenProb > churnProb ? `You'd need at least ${Math.round(calc.breakEvenProb)}% churn probability to break even.` : `Consider reducing scope below ${Math.round(calc.expectedSave / settings.hourlyRate)}h to make it viable.`}`
                    }
                  </p>
                </div>
              </div>
            </div>

            <div style={{ textAlign: "center", marginTop: 32, padding: "16px 0", borderTop: "1px solid #1a1c24" }}>
              <code style={{ fontSize: 12, color: "#444", fontFamily: "'Space Mono', monospace" }}>
                score = (ARR × churn_probability) ÷ hours | greenlight if score ≥ {settings.threshold}
              </code>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
