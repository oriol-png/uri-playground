<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re-Implementation ROI Calculator · Abacum</title>
  <link rel="icon" href="https://www.abacum.ai/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Abacum brand palette */
      --abc-black: #0f1117;
      --abc-navy: #1a1d2b;
      --abc-teal: #00c9a7;
      --abc-teal-dark: #00a88c;
      --abc-teal-light: #e6faf6;
      --abc-teal-muted: #00c9a715;
      --abc-white: #ffffff;
      --abc-bg: #2d2545;
      --abc-surface: #ffffff;
      --abc-border: #e8eaef;
      --abc-border-light: #f0f1f4;
      --abc-text: #ffffff;
      --abc-text-secondary: #c0bdd0;
      --abc-text-muted: #9ca0b0;
      --abc-amber: #f59e0b;
      --abc-amber-light: #fef9ec;
      --abc-red: #ef4444;
      --abc-red-light: #fef2f2;
      --abc-green: #00c9a7;
      --abc-green-light: #e6faf6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--abc-bg); background-image: radial-gradient(circle, #ffffff25 1px, transparent 1px); background-size: 24px 24px; color: var(--abc-text); font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    input[type=range] { height: 6px; border-radius: 3px; cursor: pointer; -webkit-appearance: none; appearance: none; background: var(--abc-border); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--abc-teal); cursor: pointer; border: 3px solid var(--abc-white); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    input[type=range].amber::-webkit-slider-thumb { background: var(--abc-amber); }
    input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--abc-teal); cursor: pointer; border: 3px solid var(--abc-white); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    input[type=range].amber::-moz-range-thumb { background: var(--abc-amber); }
    input[type=range]::-webkit-slider-runnable-track { background: var(--abc-border); border-radius: 3px; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    ::selection { background: #00c9a733; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const FACTORY_DEFAULTS = {
      arr: 35000, churnProb: 40, hours: 30, saveProb: 70,
      hourlyRate: 150, threshold: 200,
      arrMin: 10000, arrMax: 80000, hoursMin: 5, hoursMax: 80,
    };

    const SCENARIOS = [
      { label: "Low-touch fix", arr: 22000, churnProb: 20, hours: 15, saveProb: 80, desc: "Minor config tweak" },
      { label: "Mid-tier save", arr: 35000, churnProb: 45, hours: 30, saveProb: 65, desc: "Moderate rebuild" },
      { label: "Enterprise rescue", arr: 50000, churnProb: 70, hours: 45, saveProb: 55, desc: "Major rework, weak champion" },
      { label: "Quick win", arr: 28000, churnProb: 60, hours: 10, saveProb: 85, desc: "Small effort, high signal" },
      { label: "Lost cause?", arr: 30000, churnProb: 80, hours: 40, saveProb: 25, desc: "No mgmt traction" },
    ];

    function Slider({ label, value, onChange, min, max, step, format, sublabel, amber }) {
      return (
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: "#1a1d2b" }}>{label}</span>
              {sublabel && <span style={{ fontSize: 11, color: "var(--abc-text-muted)" }}>{sublabel}</span>}
            </div>
              <span style={{ fontSize: 20, fontWeight: 700, color: "#1a1d2b", fontFeatureSettings: "'tnum'" }}>{format(value)}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            className={amber ? "amber" : ""}
            onChange={e => onChange(Number(e.target.value))} style={{ width: "100%" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--abc-text-muted)", marginTop: 4 }}>
            <span>{format(min)}</span><span>{format(max)}</span>
          </div>
        </div>
      );
    }

    function NumberInput({ label, value, onChange, min, max, step, prefix, suffix }) {
      return (
        <div style={{ flex: 1, minWidth: 130 }}>
          <label style={{ fontSize: 11, fontWeight: 600, color: "var(--abc-text-secondary)", letterSpacing: "0.03em", textTransform: "uppercase", display: "block", marginBottom: 6 }}>{label}</label>
          <div style={{ display: "flex", alignItems: "center", background: "var(--abc-bg)", borderRadius: 8, border: "1px solid var(--abc-border)", padding: "8px 12px", gap: 4 }}>
            {prefix && <span style={{ color: "var(--abc-text-muted)", fontSize: 14 }}>{prefix}</span>}
            <input type="number" value={value} min={min} max={max} step={step}
              onChange={e => onChange(Number(e.target.value))}
                  style={{ background: "none", border: "none", color: "#1a1d2b", fontSize: 15,            
              {suffix && <span style={{ color: "var(--abc-text-muted)", fontSize: 12, whiteSpace: "nowrap" }}>{suffix}</span>}
          </div>
        </div>
      );
    }

    function ScoreGauge({ score, threshold }) {
      const maxScore = 1200;
      const pct = Math.min(score / maxScore, 1);
      const threshPct = Math.min(threshold / maxScore, 1);
      const pass = score >= threshold;
      return (
        <div style={{ position: "relative", height: 10, background: "var(--abc-border)", borderRadius: 5, overflow: "visible", marginBottom: 10 }}>
          <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct * 100}%`,
            background: pass ? "var(--abc-teal)" : "var(--abc-red)",
            borderRadius: 5, transition: "width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s",
            opacity: pass ? 1 : 0.8 }} />
          <div style={{ position: "absolute", left: `${threshPct * 100}%`, top: -3, bottom: -3, width: 2, background: "var(--abc-amber)", zIndex: 2, borderRadius: 1 }}>
            <div style={{ position: "absolute", top: -18, left: "50%", transform: "translateX(-50%)", fontSize: 9, color: "var(--abc-amber)", whiteSpace: "nowrap", fontWeight: 700 }}>
              ▼ {threshold}
            </div>
          </div>
        </div>
      );
    }

    function SettingsPanel({ settings, onChange, onClose }) {
      const s = settings;
      const set = (key, val) => onChange({ ...s, [key]: val });
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(15,17,23,0.4)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, backdropFilter: "blur(6px)" }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background: "var(--abc-white)", borderRadius: 20, padding: 36, maxWidth: 540, width: "100%", border: "1px solid var(--abc-border)", maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 60px rgba(0,0,0,0.12)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 28 }}>
              <div>
                <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: "#1a1d2b" }}>Team Settings</h2>
<p style={{ margin: "4px 0 0", fontSize: 13, color: "#6b7186" }}>Configure the decision framework</p>
              </div>
              <button onClick={onClose} style={{ background: "#f0f1f4", border: "1px solid var(--abc-border)", color: "#6b7186", width: 32, height: 32, borderRadius: 8, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
            </div>

            {/* Breaking point */}
            <div style={{ background: "var(--abc-amber-light)", borderRadius: 14, padding: 24, marginBottom: 24, border: "1px solid #f59e0b30" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--abc-amber)" }} />
                <span style={{ fontSize: 12, fontWeight: 700, color: "#92400e", letterSpacing: "0.05em", textTransform: "uppercase" }}>Breaking Point</span>
              </div>
              <p style={{ fontSize: 12, color: "#92400e99", margin: "6px 0 16px", lineHeight: 1.5 }}>
                Minimum score to greenlight. Score = (ARR × Churn% × Save%) ÷ Hours.
                <br />Calibrated for 12–15 month CAC payback.
              </p>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <input type="range" className="amber" min={30} max={800} step={10} value={s.threshold}
                  onChange={e => set("threshold", Number(e.target.value))} style={{ flex: 1 }} />
                <span style={{ fontSize: 32, fontWeight: 800, color: "#92400e", minWidth: 60, textAlign: "right", fontFeatureSettings: "'tnum'" }}>{s.threshold}</span>
              </div>
              <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[
                  { val: 120, label: "Aggressive", desc: "Save most accounts" },
                  { val: 200, label: "Balanced", desc: "Good ROI filter" },
                  { val: 400, label: "Conservative", desc: "Only slam dunks" },
                ].map(p => (
                  <button key={p.val} onClick={() => set("threshold", p.val)} style={{
                    background: s.threshold === p.val ? "#f59e0b18" : "var(--abc-white)",
                    border: `1.5px solid ${s.threshold === p.val ? "var(--abc-amber)" : "var(--abc-border)"}`,
                    borderRadius: 10, padding: "10px 8px", cursor: "pointer", textAlign: "center",
                  }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: s.threshold === p.val ? "#92400e" : "var(--abc-text)", fontFeatureSettings: "'tnum'" }}>{p.val}</div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: "#6b7186", marginTop: 2 }}>{p.label}</div>
                    <div style={{ fontSize: 9, color: "#9ca0b0", marginTop: 2 }}>{p.desc}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Cost */}
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "var(--abc-text-muted)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>Cost Model</div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <NumberInput label="Hourly Cost" value={s.hourlyRate} onChange={v => set("hourlyRate", v)} min={30} max={500} step={5} prefix="€" suffix="/hour" />
                <NumberInput label="CAC Payback" value={s.cacPayback} onChange={v => set("cacPayback", v)} min={3} max={36} step={1} suffix="months" />
              </div>
            </div>

            {/* Ranges */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "var(--abc-text-muted)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 12 }}>Slider Ranges</div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                <NumberInput label="ARR Min" value={s.arrMin} onChange={v => set("arrMin", v)} min={1000} max={s.arrMax - 1000} step={1000} prefix="€" />
                <NumberInput label="ARR Max" value={s.arrMax} onChange={v => set("arrMax", v)} min={s.arrMin + 1000} max={500000} step={1000} prefix="€" />
              </div>
              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 12 }}>
                <NumberInput label="Hours Min" value={s.hoursMin} onChange={v => set("hoursMin", v)} min={1} max={s.hoursMax - 1} step={1} suffix="h" />
                <NumberInput label="Hours Max" value={s.hoursMax} onChange={v => set("hoursMax", v)} min={s.hoursMin + 1} max={200} step={1} suffix="h" />
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={onClose} style={{ background: "var(--abc-teal)", border: "none", color: "var(--abc-white)", padding: "10px 28px", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Done</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [arr, setArr] = useState(FACTORY_DEFAULTS.arr);
      const [churnProb, setChurnProb] = useState(FACTORY_DEFAULTS.churnProb);
      const [saveProb, setSaveProb] = useState(FACTORY_DEFAULTS.saveProb);
      const [hours, setHours] = useState(FACTORY_DEFAULTS.hours);
      const [showSettings, setShowSettings] = useState(false);
      const [settings, setSettings] = useState({
        threshold: FACTORY_DEFAULTS.threshold, hourlyRate: FACTORY_DEFAULTS.hourlyRate,
        cacPayback: 13,
        arrMin: FACTORY_DEFAULTS.arrMin, arrMax: FACTORY_DEFAULTS.arrMax,
        hoursMin: FACTORY_DEFAULTS.hoursMin, hoursMax: FACTORY_DEFAULTS.hoursMax,
      });

      const calc = useMemo(() => {
        const churnFrac = churnProb / 100;
        const saveFrac = saveProb / 100;
        const expectedSave = arr * churnFrac * saveFrac;
        const cost = hours * settings.hourlyRate;
        const roi = cost > 0 ? ((expectedSave - cost) / cost) * 100 : 0;
        const score = hours > 0 ? expectedSave / hours : 0;
        const pass = score >= settings.threshold;
        const breakEvenSaveProb = (churnFrac > 0 && arr > 0 && hours > 0)
          ? Math.min((cost / (arr * churnFrac)) * 100, 100) : 100;
        const paybackMonths = expectedSave > 0 ? (cost / expectedSave) * 12 : Infinity;
        const netValueVsCac = expectedSave - cost;
        return { expectedSave, cost, roi, score, pass, breakEvenSaveProb, paybackMonths, netValueVsCac };
      }, [arr, churnProb, saveProb, hours, settings]);

      function loadScenario(s) { setArr(s.arr); setChurnProb(s.churnProb); setHours(s.hours); setSaveProb(s.saveProb); }

      return (
        <div style={{ minHeight: "100vh", background: "var(--abc-bg)", padding: "32px 16px" }}>
          {showSettings && <SettingsPanel settings={settings} onChange={setSettings} onClose={() => setShowSettings(false)} />}

          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="var(--abc-teal)"/><path d="M7 12h10M12 7v10" stroke="white" strokeWidth="2.5" strokeLinecap="round"/></svg>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "var(--abc-teal)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Implementations Team</span>
                </div>
                <h1 style={{ fontSize: 26, fontWeight: 800, color: "var(--abc-text)", margin: "0 0 4px 0", lineHeight: 1.2 }}>Re-Implementation ROI Calculator</h1>
                <p style={{ fontSize: 14, color: "var(--abc-text-secondary)", margin: 0, maxWidth: 480 }}>Should we invest implementation hours on this live customer?</p>
              </div>
              <button onClick={() => setShowSettings(true)} style={{ background: "var(--abc-white)", border: "1px solid var(--abc-border)", borderRadius: 10, padding: "9px 16px", color: "var(--abc-text-secondary)", fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <span style={{ fontSize: 15 }}>⚙</span> Settings
              </button>
            </div>

            {/* Threshold + cost badges */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
              <div style={{ background: "var(--abc-amber-light)", border: "1px solid #f59e0b30", borderRadius: 8, padding: "5px 12px", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 10, color: "#92400e", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>Breaking point:</span>
                <span style={{ fontSize: 15, fontWeight: 800, color: "#92400e", fontFeatureSettings: "'tnum'" }}>{settings.threshold}</span>
                <button onClick={() => setShowSettings(true)} style={{ background: "none", border: "none", color: "#92400e88", fontSize: 11, cursor: "pointer", textDecoration: "underline", fontFamily: "inherit" }}>change</button>
              </div>
              <span style={{ fontSize: 12, color: "var(--abc-text-muted)", fontFeatureSettings: "'tnum'" }}>€{settings.hourlyRate}/h · {settings.cacPayback}mo CAC</span>
            </div>

            {/* Scenarios */}
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 24 }}>
              {SCENARIOS.map((s, i) => (
                <button key={i} onClick={() => loadScenario(s)} title={s.desc} style={{ background: "var(--abc-white)", border: "1px solid var(--abc-border)", borderRadius: 8, padding: "6px 14px", color: "var(--abc-text-secondary)", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 1px 2px rgba(0,0,0,0.03)", transition: "all 0.15s" }}>
                  {s.label}
                </button>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              {/* Left: Inputs */}
              <div style={{ background: "var(--abc-white)", borderRadius: 16, padding: 28, border: "1px solid var(--abc-border)", boxShadow: "0 1px 4px rgba(0,0,0,0.03)" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--abc-text-muted)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 20 }}>Customer Parameters</div>
                <Slider label="Customer ARR" value={arr} onChange={setArr} min={settings.arrMin} max={settings.arrMax} step={1000} format={v => `€${(v/1000).toFixed(0)}k`} sublabel="annual contract" />
                <Slider label="Churn Probability" value={churnProb} onChange={setChurnProb} min={5} max={95} step={5} format={v => `${v}%`} sublabel="without re-impl" />

                {/* Save probability */}
                <div style={{ background: "var(--abc-teal-light)", borderRadius: 12, padding: "16px 16px 2px", marginBottom: 20, border: "1px solid #00c9a720" }}>
                  <Slider label="Save Probability" value={saveProb} onChange={setSaveProb} min={10} max={95} step={5} format={v => `${v}%`} sublabel="with re-impl" />
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
                    {[
                      { pct: "80-95%", desc: "Clear fix, engaged champion", color: "var(--abc-teal-dark)" },
                      { pct: "50-70%", desc: "Helps, but other issues", color: "#92400e" },
                      { pct: "20-40%", desc: "Weak buy-in, deeper problems", color: "var(--abc-red)" },
                    ].map((g, i) => (
                      <div key={i} style={{ display: "flex", gap: 5, alignItems: "baseline" }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: g.color }}>{g.pct}</span>
                        <span style={{ fontSize: 10, color: "var(--abc-text-secondary)" }}>{g.desc}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <Slider label="Hours to Invest" value={hours} onChange={setHours} min={settings.hoursMin} max={settings.hoursMax} step={5} format={v => `${v}h`} sublabel="team effort" />

                {/* Churn guide */}
                <div style={{ background: "var(--abc-bg)", borderRadius: 10, padding: 14 }}>
                  <div style={{ fontSize: 10, color: "var(--abc-text-muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8, fontWeight: 600 }}>Churn probability guide</div>
                  {[
                    { pct: "10-20%", desc: "Mentioned competitor, minor complaints" },
                    { pct: "30-45%", desc: "Escalated, multiple issues, CSM flagged" },
                    { pct: "50-65%", desc: "Evaluating alternatives, champion disengaged" },
                    { pct: "70-90%", desc: "Renewal at risk, exec sponsor involved" },
                  ].map((g, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, marginBottom: 3, alignItems: "baseline" }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "var(--abc-teal-dark)", minWidth: 46 }}>{g.pct}</span>
                      <span style={{ fontSize: 11, color: "var(--abc-text-secondary)" }}>{g.desc}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Right: Results */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {/* Verdict */}
                <div style={{
                  background: calc.pass ? "var(--abc-green-light)" : "var(--abc-red-light)",
                  borderRadius: 16, padding: 28,
                  border: `1px solid ${calc.pass ? "#00c9a730" : "#ef444430"}`,
                  boxShadow: "0 1px 4px rgba(0,0,0,0.03)",
                }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--abc-text-muted)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 14 }}>Verdict</div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 14 }}>
                    <span style={{ fontSize: 48, fontWeight: 800, color: calc.pass ? "var(--abc-teal-dark)" : "var(--abc-red)", lineHeight: 1, fontFeatureSettings: "'tnum'" }}>{Math.round(calc.score)}</span>
                    <span style={{ fontSize: 14, color: "var(--abc-text-secondary)" }}>score</span>
                    <span style={{ fontSize: 13, color: "var(--abc-text-muted)" }}>/ {settings.threshold} needed</span>
                  </div>
                  <ScoreGauge score={calc.score} threshold={settings.threshold} />
                  <div style={{
                    display: "inline-block", padding: "6px 16px", borderRadius: 20,
                    background: calc.pass ? "#00c9a718" : "#ef444418",
                    color: calc.pass ? "var(--abc-teal-dark)" : "var(--abc-red)",
                    fontSize: 13, fontWeight: 700, marginTop: 8,
                  }}>
                    {calc.pass ? "✓ Greenlight — Do the re-implementation" : "✗ Decline — Not worth the investment"}
                  </div>
                </div>

                {/* Breakdown */}
                <div style={{ background: "var(--abc-white)", borderRadius: 16, padding: 28, border: "1px solid var(--abc-border)", boxShadow: "0 1px 4px rgba(0,0,0,0.03)" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--abc-text-muted)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 16 }}>Breakdown</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                    {[
                      { label: "Expected Save", value: `€${(calc.expectedSave/1000).toFixed(1)}k`, sub: `${(arr/1000).toFixed(0)}k × ${churnProb}% × ${saveProb}%` },
                      { label: "Re-impl Cost", value: `€${(calc.cost/1000).toFixed(1)}k`, sub: `${hours}h × €${settings.hourlyRate}/h` },
                      { label: "ROI", value: `${calc.roi > 0 ? "+" : ""}${Math.round(calc.roi)}%`, sub: "(save − cost) / cost", color: calc.roi > 0 ? "var(--abc-teal-dark)" : "var(--abc-red)" },
                      { label: "Payback", value: calc.paybackMonths < 99 ? `${calc.paybackMonths.toFixed(1)}mo` : "n/a", sub: `vs ${settings.cacPayback}mo CAC`, color: calc.paybackMonths <= settings.cacPayback ? "var(--abc-teal-dark)" : (calc.paybackMonths < 99 ? "#92400e" : "var(--abc-red)") },
                      { label: "Net Value", value: `€${(calc.netValueVsCac/1000).toFixed(1)}k`, sub: "expected save − cost", color: calc.netValueVsCac > 0 ? "var(--abc-teal-dark)" : "var(--abc-red)" },
                      { label: "Break-even Save%", value: `${Math.round(calc.breakEvenSaveProb)}%`, sub: `you set ${saveProb}%`, color: saveProb >= calc.breakEvenSaveProb ? "var(--abc-teal-dark)" : "var(--abc-red)" },
                    ].map((m, i) => (
                      <div key={i} style={{ background: "var(--abc-bg)", borderRadius: 10, padding: "12px 14px" }}>
                        <div style={{ fontSize: 10, color: "var(--abc-text-muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4, fontWeight: 600 }}>{m.label}</div>
                        <div style={{ fontSize: 20, fontWeight: 800, color: m.color || "var(--abc-text)", fontFeatureSettings: "'tnum'" }}>{m.value}</div>
                        <div style={{ fontSize: 10, color: "var(--abc-text-muted)", marginTop: 2 }}>{m.sub}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Quick read */}
                <div style={{ background: "var(--abc-white)", borderRadius: 16, padding: 20, border: "1px solid var(--abc-border)", boxShadow: "0 1px 4px rgba(0,0,0,0.03)" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "var(--abc-text-muted)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>Quick read</div>
                  <p style={{ fontSize: 13, color: "var(--abc-text-secondary)", margin: 0, lineHeight: 1.7 }}>
                    {calc.pass
                      ? `With a ${churnProb}% churn risk and ${saveProb}% chance of saving them, the expected save of €${(calc.expectedSave/1000).toFixed(1)}k justifies the €${(calc.cost/1000).toFixed(1)}k investment (${Math.round(calc.roi)}% ROI). Payback in ~${calc.paybackMonths.toFixed(1)} months${calc.paybackMonths <= settings.cacPayback ? " — faster than your CAC payback." : "."}`
                      : `Expected save of €${(calc.expectedSave/1000).toFixed(1)}k (factoring in ${saveProb}% save probability) doesn't justify €${(calc.cost/1000).toFixed(1)}k. ${saveProb < calc.breakEvenSaveProb ? `You'd need at least ${Math.round(calc.breakEvenSaveProb)}% save confidence to break even — likely a customer engagement or management issue.` : `Consider reducing scope below ${Math.round(calc.expectedSave / settings.hourlyRate)}h to make it viable.`}`
                    }
                  </p>
                </div>
              </div>
            </div>

            {/* Footer */}
            <div style={{ textAlign: "center", marginTop: 32, padding: "16px 0", borderTop: "1px solid var(--abc-border)" }}>
              <code style={{ fontSize: 12, color: "var(--abc-text-muted)" }}>
                score = (ARR × churn% × save%) ÷ hours | greenlight if score ≥ {settings.threshold}
              </code>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
